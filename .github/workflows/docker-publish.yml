name: Release

# Tag-driven release for the dedicated, app-agnostic collab image. Pushing a
# SemVer tag (vX.Y.Z) builds the standalone collab-server Docker image and
# publishes it to Docker Hub as both `vX.Y.Z` and `latest`, then creates a
# GitHub Release with the tag's commit log as the body. Mirrors the sibling
# casualoffice/docs release workflow (tag strips the leading `v`).
#
# Setup (maintainer must configure once):
#   - A Docker Hub repository `casualoffice/collab`.
#   - A GitHub Environment named `dockerhub` with secrets:
#       DOCKERHUB_USERNAME  — docker.io login (the `casualoffice` org)
#       DOCKERHUB_TOKEN     — scoped access token (Read/Write/Delete on
#                              casualoffice/collab)
#
# Usage:
#   git tag v0.1.0 -m "first collab image release"
#   git push origin v0.1.0
#
# Pre-release tags (e.g. v0.1.0-rc.1) skip the `latest` tag so a release
# candidate doesn't move the main pointer.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  # Manual re-build of an already-released tag. A tag push builds amd64
  # only (fast); dispatch this with the tag input to rebuild that tag as
  # full multi-arch (amd64+arm64) on-demand, so arm64 never blocks a
  # release: gh workflow run docker-publish.yml -f tag=v0.1.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build for multi-arch, e.g. v0.1.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  docker:
    name: Publish collab image
    runs-on: ubuntu-latest
    environment: dockerhub
    steps:
      - uses: actions/checkout@v6
        with:
          # On a manual dispatch GITHUB_REF_NAME is the branch, so check
          # out the requested tag; on a tag push this resolves to the tag.
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Resolve version
        id: ver
        run: |
          # Prefer the dispatched `tag` input (manual multi-arch rebuild);
          # fall back to the pushed tag ref for the normal release path.
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/collab
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.prerelease == 'false' }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Tag push → amd64 only (fast; arm64 under QEMU adds ~60 min and
          # was blocking releases). Manual dispatch → full multi-arch, so
          # arm64 is available on-demand without gating the release.
          platforms: ${{ github.event_name == 'workflow_dispatch' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync README + short description to Docker Hub
        # Pushes the repo's README.md as the Docker Hub long description so
        # the image's "Overview" tab has the same quickstart / deployment
        # instructions visitors see on GitHub. Skipped on prereleases — the
        # Docker Hub copy tracks the latest production release.
        #
        # continue-on-error: the description API needs account-level
        # permissions the registry push token may lack (it can 403). The
        # image is already published by this point, so a failed description
        # sync must NOT fail the release or block the GitHub Release job.
        continue-on-error: true
        if: steps.ver.outputs.prerelease == 'false'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/collab
          short-description: 'App-agnostic real-time collaboration server (Hocuspocus + Yjs on Fastify). One deployment brokers .docx + .xlsx + future rooms for any host app. Apache-2.0.'
          readme-filepath: ./README.md

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    # Only on the tag-push release path. A manual dispatch is just an
    # on-demand multi-arch image rebuild; the GitHub Release already exists.
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        run: |
          # Find the previous tag (chronologically before this one) so the
          # body is just the commits since then. Falls back to the full
          # history for the very first tag.
          prev=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
          {
            echo "## What's in this release"
            echo ""
            if [ -n "$prev" ]; then
              echo "Changes since \`$prev\`:"
              echo ""
              git log --pretty='- %s' "$prev..HEAD"
            else
              echo "First tagged release."
              echo ""
              git log --pretty='- %s' HEAD
            fi
            echo ""
            echo "## Self-host"
            echo ""
            echo '```bash'
            echo "docker run --rm -p 1234:1234 -e CASUAL_JWT_SECRET=<same-as-host> ${{ secrets.DOCKERHUB_USERNAME }}/collab:${GITHUB_REF_NAME#v}"
            echo '```'
            echo ""
            echo "Point any host app's collab URL at this server (WS /yjs + REST /api/rooms)."
          } > release-notes.md
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            flags+=(--prerelease)
          fi
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            "${flags[@]}"
